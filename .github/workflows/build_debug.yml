name: Build Debug APK
on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-debug:
    name: Build Signed Debug APK
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Decode signing keystore
        run: echo "${{ secrets.SIGNING_KEYSTORE }}" | base64 -d > /tmp/signing-keystore.jks

      - name: Build debug APK
        run: ./gradlew assembleDebug
        env:
          SIGNING_STORE_FILE: /tmp/signing-keystore.jks
          SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}

      - name: Upload universal debug APK
        uses: actions/upload-artifact@v4
        with:
          name: mihon-debug-universal-${{ github.sha }}
          path: app/build/outputs/apk/debug/app-universal-debug.apk

      - name: Clean up keystore
        if: always()
        run: rm -f /tmp/signing-keystore.jks
